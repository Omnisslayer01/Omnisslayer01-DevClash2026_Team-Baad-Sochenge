<!-- templates/myapp/verify.html -->
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Liveness Verification</title>
    <style>
        body { font-family: sans-serif; display: flex; flex-direction: column; align-items: center; background: #f4f4f9; padding: 2rem; }
        .camera-container { background: white; padding: 1rem; border-radius: 8px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); text-align: center; }
        video { width: 100%; max-width: 400px; border-radius: 4px; background: #000; }
        canvas { display: none; }
        button { margin-top: 1rem; padding: 10px 20px; background: #0056b3; color: white; border: none; border-radius: 4px; cursor: pointer; font-size: 1rem; width: 100%; }
        button:hover { background: #004494; }
        button:disabled { background: #ccc; cursor: not-allowed; }
        #status { margin-top: 1rem; font-weight: bold; color: #333; }
    </style>
</head>
<body>

    <div class="camera-container">
        <h2>Face Verification</h2>
        <p>Please look at the camera to verify you are human.</p>
        
        <!-- Video stream -->
        <video id="video" autoplay playsinline></video>
        
        <!-- Hidden canvas to capture the frame -->
        <canvas id="canvas"></canvas>
        
        <button id="captureBtn">Verify My Face</button>
        <button id="challengeBtn" type="button">I completed blink + turn challenge</button>
        <p id="status"></p>
    </div>

    <!-- Need CSRF token for Django POST requests via JS -->
    <form id="csrfForm">{% csrf_token %}</form>

    <script>
        const video = document.getElementById('video');
        const canvas = document.getElementById('canvas');
        const captureBtn = document.getElementById('captureBtn');
        const challengeBtn = document.getElementById('challengeBtn');
        const statusText = document.getElementById('status');
        const csrfToken = document.querySelector('[name=csrfmiddlewaretoken]').value;
        let challengeCompleted = false;

        // Start the webcam
        navigator.mediaDevices.getUserMedia({ video: true })
            .then(stream => {
                video.srcObject = stream;
            })
            .catch(err => {
                console.error("Camera error:", err);
                statusText.innerText = "Error accessing camera. Please allow permissions.";
                statusText.style.color = "red";
            });

        challengeBtn.addEventListener('click', () => {
            challengeCompleted = true;
            statusText.innerText = "Challenge marked complete. Capture and verify now.";
            statusText.style.color = "green";
        });

        captureBtn.addEventListener('click', () => {
            if (!challengeCompleted) {
                statusText.innerText = "Please complete live challenge first (blink + turn your head).";
                statusText.style.color = "red";
                return;
            }
            // UI Update
            captureBtn.disabled = true;
            statusText.innerText = "Analyzing face... please wait.";
            statusText.style.color = "blue";

            // Draw current video frame to canvas
            const context = canvas.getContext('2d');
            canvas.width = video.videoWidth;
            canvas.height = video.videoHeight;
            context.drawImage(video, 0, 0, canvas.width, canvas.height);

            // Convert canvas image to Blob
            canvas.toBlob(blob => {
                const formData = new FormData();
                formData.append('photo', blob, 'capture.jpg'); // Appending image file
                formData.append('challenge_completed', 'true');

                // Send to Django backend
                fetch('{% url "process_liveness" %}', {
                    method: 'POST',
                    headers: {
                        'X-CSRFToken': csrfToken
                    },
                    body: formData
                })
                .then(response => response.json())
                .then(data => {
                    if (data.success) {
                        statusText.innerText = "Success! Redirecting...";
                        statusText.style.color = "green";
                        // Stop camera stream
                        video.srcObject.getTracks().forEach(track => track.stop());
                        // Redirect to dashboard
                        setTimeout(() => window.location.href = "{% url 'dashboard' %}", 1000);
                    } else {
                        statusText.innerText = "Failed: " + data.message;
                        statusText.style.color = "red";
                        captureBtn.disabled = false;
                    }
                })
                .catch(error => {
                    console.error("Error:", error);
                    statusText.innerText = "Network error. Try again.";
                    statusText.style.color = "red";
                    captureBtn.disabled = false;
                });
            }, 'image/jpeg');
        });
    </script>
</body>
</html>
