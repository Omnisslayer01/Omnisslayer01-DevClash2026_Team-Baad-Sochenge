{% extends "myapp/base.html" %}
{% block title %}Log in · Global Connect{% endblock %}
{% block content %}
<div class="auth-page">
    <div class="auth-card">
        <h2>Log in</h2>
        <p class="muted auth-lead">Use your <strong>email</strong> or <strong>username</strong>, then your password.</p>
        <form method="post" action="{% url 'login' %}">
            {% csrf_token %}
            <label for="id_username">Email or username</label>
            <input id="id_username" type="text" name="username" placeholder="you@example.com or username" required autocomplete="username">
            <label for="id_password">Password</label>
            <input id="id_password" type="password" name="password" placeholder="Password" required autocomplete="current-password">
            <button class="btn" type="submit">Log in</button>
        </form>
        <p class="muted auth-footer">New here? <a href="{% url 'signup' %}">Create an account</a></p>
    </div>
</div>
{% endblock %}
