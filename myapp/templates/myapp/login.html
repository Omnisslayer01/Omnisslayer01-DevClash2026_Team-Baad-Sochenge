<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login</title>
    <style>
        body { margin: 0; display: grid; place-items: center; height: 100vh; font-family: Arial, sans-serif; background: #f3f2ef; }
        .card { width: 360px; background: #fff; border-radius: 10px; padding: 20px; box-shadow: 0 2px 8px rgba(0,0,0,.1); }
        input { width: 100%; margin-top: 8px; margin-bottom: 14px; padding: 8px; box-sizing: border-box; border: 1px solid #ccc; border-radius: 6px; }
        button { width: 100%; padding: 10px; border: none; background: #0a66c2; color: #fff; border-radius: 6px; cursor: pointer; }
    </style>
</head>
<body>
<div class="card">
    <h2>Login</h2>
    {% if messages %}
        {% for message in messages %}
            <p style="color:#b42318;">{{ message }}</p>
        {% endfor %}
    {% endif %}
    <form method="POST">
        {% csrf_token %}
        <input type="text" name="username" placeholder="Username" required>
        <input type="password" name="password" placeholder="Password" required>
        <button type="submit">Login</button>
    </form>
    <p>New user? <a href="{% url 'signup' %}">Create account</a></p>
</div>
</body>
</html>
