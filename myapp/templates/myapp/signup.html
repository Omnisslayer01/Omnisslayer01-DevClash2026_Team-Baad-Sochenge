{% extends "myapp/base.html" %}
{% block title %}Sign up · Global Connect{% endblock %}
{% block content %}
<div class="auth-page">
    <div class="auth-card">
        <h2>Create account</h2>
        <p class="muted auth-lead">Join as a professional or company.</p>
        <form method="post" action="{% url 'signup' %}">
            {% csrf_token %}
            <label for="su_full_name">Full name</label>
            <input id="su_full_name" type="text" name="full_name" required autocomplete="name">
            <label for="su_username">Username</label>
            <input id="su_username" type="text" name="username" required autocomplete="username">
            <label for="su_email">Email</label>
            <input id="su_email" type="email" name="email" autocomplete="email">
            <label for="su_role">Join as</label>
            <select id="su_role" name="role" required>
                <option value="professional">Professional</option>
                <option value="company">Company</option>
            </select>
            <label for="su_password">Password</label>
            <input id="su_password" type="password" name="password" required autocomplete="new-password">
            <button class="btn" type="submit">Create account</button>
        </form>
        <p class="muted auth-footer">Already have an account? <a href="{% url 'login' %}">Log in</a></p>
    </div>
</div>
{% endblock %}
