<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign Up | Devkraft</title>
    <style>
        :root { --primary: #2563eb; --bg: #f8fafc; --text: #0f172a; }
        body { font-family: system-ui, sans-serif; background: var(--bg); color: var(--text); display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; }
        .card { background: white; padding: 2rem; border-radius: 12px; box-shadow: 0 4px 6px -1px rgb(0 0 0 / 0.1); width: 100%; max-width: 400px; }
        h2 { margin-top: 0; }
        .form-group { margin-bottom: 1rem; }
        label { display: block; font-size: 0.875rem; margin-bottom: 0.25rem; font-weight: 500; }
        input { width: 100%; padding: 0.5rem; border: 1px solid #cbd5e1; border-radius: 6px; box-sizing: border-box; }
        button { width: 100%; background: var(--primary); color: white; padding: 0.75rem; border: none; border-radius: 6px; font-weight: 600; cursor: pointer; margin-top: 1rem; }
        button:hover { background: #1d4ed8; }
        .link { font-size: 0.875rem; text-align: center; margin-top: 1rem; display: block; }
    </style>
</head>
<body>
    <div class="card">
        <h2>Join as a Professional</h2>
        <form method="POST">
            {% csrf_token %}
            {% if messages %}
                {% for message in messages %}
                    <p style="color:#b42318;">{{ message }}</p>
                {% endfor %}
            {% endif %}
            <div class="form-group">
                <label>Full Name</label>
                <input type="text" name="full_name" required>
            </div>
            <div class="form-group">
                <label>Username</label>
                <input type="text" name="username" required>
            </div>
            <div class="form-group">
                <label>Email Address</label>
                <input type="email" name="email">
            </div>
            <div class="form-group">
                <label>Join As</label>
                <select name="role">
                    <option value="professional">Professional</option>
                    <option value="company">Company</option>
                </select>
            </div>
            <div class="form-group">
                <label>Password</label>
                <input type="password" name="password" required>
            </div>
            <button type="submit">Create Account</button>
        </form>
        <a href="{% url 'login' %}" class="link">Already have an account? Log in</a>
    </div>
</body>
</html>
